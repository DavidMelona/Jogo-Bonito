<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Bonito - Tienda de Fútbol</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* =====================================================
           RESET Y BASE
           ===================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: #fff;
            color: #333;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* =====================================================
           HEADER - Estilo NEW NOW
           ===================================================== */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Logo */
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #1a1a1a;
        }

        .logo span {
            color: #1a5d1a;
        }

        /* Navegación central */
        .main-nav {
            display: flex;
            gap: 35px;
        }

        .nav-item {
            position: relative;
            font-size: 0.95rem;
            font-weight: 500;
            color: #333;
            padding: 10px 0;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #1a5d1a;
        }

        .nav-item::after {
            content: '▼';
            font-size: 0.6rem;
            margin-left: 5px;
            opacity: 0.5;
        }

        .nav-item.no-dropdown::after {
            display: none;
        }

        /* Acciones derecha */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .login-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
            transition: color 0.3s ease;
        }

        .login-link:hover {
            color: #1a5d1a;
        }

        .search-btn, .cart-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #333;
            transition: color 0.3s ease;
        }

        .search-btn:hover, .cart-btn:hover {
            color: #1a5d1a;
        }

        .cart-btn {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #1a5d1a;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-total {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
        }

        /* =====================================================
           BANNER PRINCIPAL
           ===================================================== */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 450px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            display: flex;
            justify-content: center;
        }

        .btn-comprar {
            background: #ffc107;
            color: #1a1a1a;
            padding: 15px 50px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-comprar:hover {
            background: #ffca28;
            transform: scale(1.05);
        }

        /* =====================================================
           SECCIÓN DE PRODUCTOS
           ===================================================== */
        .products-section {
            padding: 50px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            font-style: italic;
            color: #1a1a1a;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Grid de productos estilo NEW NOW */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 900px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Tarjeta de producto minimalista */
        .product-card {
            background: #f8f8f8;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            padding: 15px;
            background: #f8f8f8;
        }

        .product-info {
            padding: 15px;
            text-align: center;
            background: white;
        }

        .product-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 700;
            color: #1a5d1a;
        }

        .product-price .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.85rem;
            margin-right: 8px;
        }

        /* Botón añadir al carrito (aparece en hover) */
        .btn-add {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a5d1a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .product-card:hover .btn-add {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .btn-add:hover {
            background: #2d8f2d;
        }

        /* Badge de oferta */
        .badge-sale {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 3px;
        }

        /* =====================================================
           FOOTER
           ===================================================== */
        .main-footer {
            background: #1a1a1a;
            color: #fff;
            padding: 40px;
            text-align: center;
            margin-top: 50px;
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .footer-logo span {
            color: #1a5d1a;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .footer-links a {
            color: #aaa;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #fff;
        }

        .footer-copy {
            color: #666;
            font-size: 0.8rem;
        }

        /* =====================================================
           NOTIFICACIÓN
           ===================================================== */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a5d1a;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 3000;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* =====================================================
           RESPONSIVE HEADER
           ===================================================== */
        @media (max-width: 900px) {
            .main-header {
                flex-wrap: wrap;
                padding: 15px 20px;
            }

            .main-nav {
                order: 3;
                width: 100%;
                justify-content: center;
                margin-top: 15px;
                gap: 20px;
                flex-wrap: wrap;
            }

            .hero-banner {
                height: 300px;
            }

            .products-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- =====================================================
         HEADER ESTILO NEW NOW
         ===================================================== -->
    <header class="main-header">
        <!-- Logo -->
        <a href="home.html" class="logo">JOGO <span>BONITO</span></a>

        <!-- Navegación -->
        <nav class="main-nav">
            <a href="home.html" class="nav-item no-dropdown">Home</a>
            <a href="camisetas.html" class="nav-item">Camisetas</a>
            <a href="botas.html" class="nav-item">Botas</a>
            <a href="#" class="nav-item">Selecciones</a>
            <a href="#" class="nav-item">Ofertas</a>
        </nav>

        <!-- Acciones -->
        <div class="header-actions">
            <a href="login.html" class="login-link">Login / Register</a>
            <button class="search-btn">🔍</button>
            <a href="carrito.html" class="cart-btn">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <span class="cart-total" id="cartTotal">0,00 €</span>
        </div>
    </header>

    <!-- =====================================================
         BANNER PRINCIPAL
         ===================================================== -->
    <section class="hero-banner">
        <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1400" alt="Camisetas de fútbol">
        <div class="hero-overlay">
            <button class="btn-comprar" onclick="window.location.href='camisetas.html'">COMPRA AHORA</button>
        </div>
    </section>

    <!-- =====================================================
         LOS MÁS VENDIDOS - CAMISETAS
         ===================================================== -->
    <section class="products-section">
        <h2 class="section-title">Los Más Vendidos</h2>
        <div class="products-grid" id="camisetasGrid">
            <!-- Productos generados con JS -->
        </div>
    </section>

    <!-- =====================================================
         BOTAS DE FÚTBOL
         ===================================================== -->
    <section class="products-section">
        <h2 class="section-title">Botas de Fútbol</h2>
        <div class="products-grid" id="botasGrid">
            <!-- Productos generados con JS -->
        </div>
    </section>

    <!-- =====================================================
         FOOTER
         ===================================================== -->
    <footer class="main-footer">
        <div class="footer-logo">JOGO <span>BONITO</span></div>
        <div class="footer-links">
            <a href="home.html">Home</a>
            <a href="camisetas.html">Camisetas</a>
            <a href="botas.html">Botas</a>
            <a href="carrito.html">Carrito</a>
            <a href="ajustes.html">Mi Cuenta</a>
            <a href="#">Contacto</a>
        </div>
        <p class="footer-copy">© 2026 Jogo Bonito - Tu tienda de fútbol de confianza | Reus, Catalunya</p>
    </footer>

    <!-- =====================================================
         JAVASCRIPT
         ===================================================== -->
    <script>
        // =====================================================
        // BASE DE DATOS DE PRODUCTOS
        // =====================================================

        const camisetas = [
            { id: 1, nombre: "FC Barcelona Home 24/25", precio: 89.99, oldPrice: 99.99, img: "https://images.unsplash.com/photo-1580087256394-dc596e1c8f4f?w=400", sale: true },
            { id: 2, nombre: "Atlético Madrid Home", precio: 84.99, img: "https://images.unsplash.com/photo-1577212017184-80cc0da11082?w=400" },
            { id: 3, nombre: "Real Betis Home 24/25", precio: 79.99, img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=400" },
            { id: 4, nombre: "España Selección 2024", precio: 94.99, oldPrice: 109.99, img: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=400", sale: true },
            { id: 5, nombre: "Real Madrid Home 24/25", precio: 89.99, img: "https://images.unsplash.com/photo-1551854838-212c50b4c184?w=400" },
            { id: 6, nombre: "FC Barcelona Away", precio: 89.99, img: "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400" }
        ];

        const botas = [
            { id: 11, nombre: "Nike Mercurial Vapor 15", precio: 159.99, img: "https://images.unsplash.com/photo-1511886929837-354d827aae26?w=400" },
            { id: 12, nombre: "Adidas Predator Edge", precio: 189.99, oldPrice: 219.99, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400", sale: true },
            { id: 13, nombre: "Puma Future Z 1.4", precio: 169.99, img: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=400" },
            { id: 14, nombre: "Nike Phantom GT2", precio: 179.99, img: "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=400" },
            { id: 15, nombre: "Adidas Copa Pure", precio: 149.99, img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400" },
            { id: 16, nombre: "Nike Tiempo Legend 9", precio: 169.99, oldPrice: 189.99, img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=400", sale: true }
        ];

        // =====================================================
        // CARRITO
        // =====================================================

        let carrito = JSON.parse(localStorage.getItem('jogoBonitoCart')) || [];

        function guardarCarrito() {
            localStorage.setItem('jogoBonitoCart', JSON.stringify(carrito));
            actualizarCarritoUI();
        }

        function actualizarCarritoUI() {
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');

            const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            const totalPrecio = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);

            countEl.textContent = totalItems;
            totalEl.textContent = totalPrecio.toFixed(2) + ' €';
        }

        function agregarAlCarrito(producto) {
            const existente = carrito.find(item => item.id === producto.id);

            if (existente) {
                existente.cantidad++;
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }

            guardarCarrito();
            mostrarNotificacion('✅ Añadido al carrito');
        }

        function mostrarNotificacion(mensaje) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = mensaje;
            document.body.appendChild(notif);

            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        // =====================================================
        // RENDERIZAR PRODUCTOS
        // =====================================================

        function renderizarProductos(productos, contenedorId) {
            const contenedor = document.getElementById(contenedorId);
            contenedor.innerHTML = '';

            productos.forEach((producto) => {
                const card = document.createElement('div');
                card.className = 'product-card';

                const saleHtml = producto.sale ? '<span class="badge-sale">OFERTA</span>' : '';
                const oldPriceHtml = producto.oldPrice ? `<span class="old-price">${producto.oldPrice.toFixed(2)}€</span>` : '';

                card.innerHTML = `
                    ${saleHtml}
                    <img src="${producto.img}" alt="${producto.nombre}">
                    <button class="btn-add" onclick='event.stopPropagation(); agregarAlCarrito(${JSON.stringify(producto)})'>
                        + Añadir
                    </button>
                    <div class="product-info">
                        <p class="product-name">${producto.nombre}</p>
                        <p class="product-price">
                            ${oldPriceHtml}
                            ${producto.precio.toFixed(2)}€
                        </p>
                    </div>
                `;

                contenedor.appendChild(card);
            });
        }

        // =====================================================
        // INICIALIZACIÓN
        // =====================================================

        document.addEventListener('DOMContentLoaded', function() {
            renderizarProductos(camisetas, 'camisetasGrid');
            renderizarProductos(botas, 'botasGrid');
            actualizarCarritoUI();
        });
    </script>

</body>
</html>
