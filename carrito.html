<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compra - Jogo Bonito</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* RESET Y BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', Arial, sans-serif; background: #f9f9f9; color: #333; }
        a { text-decoration: none; color: inherit; }

        /* HEADER */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; color: #1a1a1a; }
        .logo span { color: #1a5d1a; }
        .main-nav { display: flex; gap: 40px; }
        .nav-item { font-size: 0.95rem; font-weight: 600; color: #333; padding: 10px 0; transition: color 0.3s ease; }
        .nav-item:hover, .nav-item.active { color: #1a5d1a; }
        .header-actions { display: flex; align-items: center; gap: 25px; }
        .user-icon { width: 32px; height: 32px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* CONTENEDOR CARRITO */
        .cart-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        /* TABLA DE PRODUCTOS */
        .cart-items { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .cart-header { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; }
        .cart-empty { text-align: center; padding: 40px; color: #666; }
        .cart-empty-icon { font-size: 3rem; margin-bottom: 15px; }
        .cart-empty-btn { background: #1a5d1a; color: white; padding: 12px 30px; border-radius: 8px; display: inline-block; margin-top: 15px; transition: background 0.3s ease; }
        .cart-empty-btn:hover { background: #2d8f2d; }

        .cart-item { display: grid; grid-template-columns: 100px 1fr 100px 100px 50px; gap: 20px; align-items: center; padding: 20px; border-bottom: 1px solid #f0f0f0; }
        .item-image { width: 100px; height: 100px; background: #f0f0f0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .item-details h3 { font-size: 1rem; font-weight: 700; margin-bottom: 5px; }
        .item-details p { color: #666; font-size: 0.9rem; }
        .item-quantity { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #e0e0e0; border: none; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; transition: background 0.3s ease; }
        .qty-btn:hover { background: #d0d0d0; }
        .qty-input { width: 50px; text-align: center; border: 1px solid #e0e0e0; border-radius: 5px; padding: 5px; }
        .item-price { font-weight: 700; font-size: 1.1rem; }
        .item-total { font-weight: 700; text-align: right; }
        .remove-btn { background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 5px 10px; transition: background 0.3s ease; }
        .remove-btn:hover { background: #c0392b; }

        /* RESUMEN */
        .cart-summary { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); height: fit-content; }
        .summary-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
        .summary-row.total { font-size: 1.2rem; font-weight: 800; color: #1a5d1a; border: none; margin-top: 15px; padding-top: 15px; border-top: 2px solid #f0f0f0; }
        .checkout-btn { background: #1a5d1a; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; }
        .checkout-btn:hover { background: #2d8f2d; transform: translateY(-2px); }
        .continue-btn { background: #e0e0e0; color: #333; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.3s ease; }
        .continue-btn:hover { background: #d0d0d0; }

        /* FOOTER */
        .main-footer { background: #1a1a1a; color: #fff; padding: 40px; text-align: center; margin-top: 50px; }
        .footer-logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; }
        .footer-logo span { color: #1a5d1a; }
        .footer-copy { color: #666; font-size: 0.8rem; }

        @media (max-width: 900px) {
            .cart-container { grid-template-columns: 1fr; }
            .cart-item { grid-template-columns: 80px 1fr; gap: 15px; }
            .item-quantity, .item-price, .item-total { display: none; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="home.html" class="logo">JOGO <span>BONITO</span></a>
        <nav class="main-nav">
            <a href="home.html" class="nav-item">Home</a>
            <a href="camisetas.html" class="nav-item">Camisetas</a>
            <a href="botas.html" class="nav-item">Botas</a>
        </nav>
        <div class="header-actions">
            <a href="login.html">
                <div class="user-icon">👤</div>
            </a>
            <a href="carrito.html" style="position: relative;">
                🛒
                <span id="cartCount" style="position: absolute; top: -8px; right: -10px; background: #1a5d1a; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700;">0</span>
            </a>
        </div>
    </header>

    <div class="cart-container">
        <div class="cart-items">
            <h2 class="cart-header">🛒 Tu Carrito de Compra</h2>
            <div id="cartContent">
                <div class="cart-empty">
                    <div class="cart-empty-icon">📦</div>
                    <p>Tu carrito está vacío</p>
                    <a href="home.html" class="cart-empty-btn">Continuar Comprando</a>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <h3 class="summary-title">Resumen</h3>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">0,00 €</span>
            </div>
            <div class="summary-row">
                <span>Envío:</span>
                <span>Gratis</span>
            </div>
            <div class="summary-row">
                <span>Impuestos (21%):</span>
                <span id="taxes">0,00 €</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="total">0,00 €</span>
            </div>
            <button class="checkout-btn" onclick="procederPago()">Proceder al Pago</button>
            <a href="home.html"><button class="continue-btn">Continuar Comprando</button></a>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-logo">JOGO <span>BONITO</span></div>
        <p class="footer-copy">© 2026 Jogo Bonito - Tu tienda de fútbol de confianza | Reus, Catalunya</p>
    </footer>

    <script>
        let carrito = JSON.parse(localStorage.getItem('jogoBonitoCart')) || [];

        function renderCarrito() {
            const cartContent = document.getElementById('cartContent');
            const cartCount = document.getElementById('cartCount');
            
            if (carrito.length === 0) {
                cartContent.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">📦</div>
                        <p>Tu carrito está vacío</p>
                        <a href="home.html" class="cart-empty-btn">Continuar Comprando</a>
                    </div>
                `;
                document.querySelector('.cart-summary').style.display = 'none';
                return;
            }

            document.querySelector('.cart-summary').style.display = 'block';
            cartContent.innerHTML = '';
            
            carrito.forEach((item, index) => {
                const itemTotal = (item.precio * item.cantidad).toFixed(2);
                cartContent.innerHTML += `
                    <div class="cart-item">
                        <div class="item-image">⚽</div>
                        <div class="item-details">
                            <h3>${item.nombre}</h3>
                            <p>${item.precio.toFixed(2)} € por unidad</p>
                        </div>
                        <div class="item-quantity">
                            <button class="qty-btn" onclick="cambiarCantidad(${index}, -1)">−</button>
                            <input type="number" class="qty-input" value="${item.cantidad}" min="1" onchange="cambiarCantidadDirecta(${index}, this.value)">
                            <button class="qty-btn" onclick="cambiarCantidad(${index}, 1)">+</button>
                        </div>
                        <div class="item-price">${itemTotal} €</div>
                        <button class="remove-btn" onclick="eliminarDelCarrito(${index})">❌</button>
                    </div>
                `;
            });

            actualizarResumen();
            cartCount.textContent = carrito.reduce((sum, item) => sum + item.cantidad, 0);
        }

        function cambiarCantidad(index, cantidad) {
            carrito[index].cantidad += cantidad;
            if (carrito[index].cantidad <= 0) {
                carrito.splice(index, 1);
            }
            guardarCarrito();
            renderCarrito();
        }

        function cambiarCantidadDirecta(index, cantidad) {
            carrito[index].cantidad = parseInt(cantidad) || 1;
            if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
            guardarCarrito();
            renderCarrito();
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            guardarCarrito();
            renderCarrito();
        }

        function actualizarResumen() {
            const subtotal = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            const taxes = subtotal * 0.21;
            const total = subtotal + taxes;

            document.getElementById('subtotal').textContent = subtotal.toFixed(2) + ' €';
            document.getElementById('taxes').textContent = taxes.toFixed(2) + ' €';
            document.getElementById('total').textContent = total.toFixed(2) + ' €';
        }

        function guardarCarrito() {
            localStorage.setItem('jogoBonitoCart', JSON.stringify(carrito));
        }

        function procederPago() {
            if (carrito.length === 0) {
                alert('Tu carrito está vacío');
                return;
            }
            alert('✅ Proceder al pago (Implementar pasarela de pago)');
        }

        document.addEventListener('DOMContentLoaded', renderCarrito);
    </script>

</body>
</html>
