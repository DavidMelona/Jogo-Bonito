<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - Jogo Bonito</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* Estilos generales */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f9f9f9; color: #333; }
    a { text-decoration: none; color: inherit; }

    /* Barra de arriba con logo, nav y carrito */
    .main-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 40px; background: #fff;
      border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.8rem; font-weight: 800; color: #1a1a1a; }
    .logo span { color: #1a5d1a; }
    .main-nav { display: flex; gap: 40px; }
    .nav-item { font-weight: 600; color: #333; padding: 10px 0; }
    .nav-item:hover { color: #1a5d1a; }
    .user-icon {
      width: 32px; height: 32px; background: #e0e0e0;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .cart-icon { position: relative; font-size: 1.3rem; }
    .cart-count {
      position: absolute; top: -8px; right: -10px;
      background: #1a5d1a; color: white; font-size: 0.7rem; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* Contenedor principal: lista de productos + resumen lateral */
    .cart-container {
      max-width: 1200px; margin: 40px auto; padding: 0 20px;
      display: grid; grid-template-columns: 1fr 350px; gap: 30px;
    }

    /* Zona de productos del carrito */
    .cart-items {
      background: white; border-radius: 15px;
      padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .cart-items h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; }

    /* Mensaje cuando el carrito está vacío */
    .cart-empty { text-align: center; padding: 40px; color: #666; }
    .cart-empty-icon { font-size: 3rem; margin-bottom: 15px; }
    .cart-empty-btn {
      background: #1a5d1a; color: white; padding: 12px 30px;
      border-radius: 8px; display: inline-block; margin-top: 15px;
    }
    .cart-empty-btn:hover { background: #2d8f2d; }

    /* Fila de cada producto en el carrito */
    .cart-item {
      display: grid; grid-template-columns: 80px 1fr 120px 100px 40px;
      gap: 20px; align-items: center; padding: 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .item-image {
      width: 80px; height: 80px; background: #f0f0f0;
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 2.5rem;
    }
    .item-details h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .item-details p { color: #666; font-size: 0.85rem; }

    /* Botones de cantidad (+/-) */
    .item-quantity { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      background: #e0e0e0; border: none; width: 28px; height: 28px;
      border-radius: 5px; cursor: pointer; font-size: 1rem;
    }
    .qty-btn:hover { background: #d0d0d0; }
    .qty-input { width: 45px; text-align: center; border: 1px solid #e0e0e0; border-radius: 5px; padding: 4px; }
    .item-price { font-weight: 700; font-size: 1rem; }

    /* Botón de eliminar producto */
    .remove-btn {
      background: #e74c3c; color: white; border: none;
      border-radius: 5px; cursor: pointer; padding: 5px 8px;
    }
    .remove-btn:hover { background: #c0392b; }

    /* Caja de resumen del pedido */
    .cart-summary {
      background: white; border-radius: 15px;
      padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      height: fit-content;
    }
    .cart-summary h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; }
    .summary-row {
      display: flex; justify-content: space-between;
      margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0;
    }
    .summary-row.total {
      font-size: 1.2rem; font-weight: 800; color: #1a5d1a;
      border: none; margin-top: 15px; padding-top: 15px; border-top: 2px solid #f0f0f0;
    }

    /* Botones del resumen */
    .checkout-btn {
      background: #1a5d1a; color: white; width: 100%;
      padding: 14px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 20px;
    }
    .checkout-btn:hover { background: #2d8f2d; }
    .continue-btn {
      background: #e0e0e0; color: #333; width: 100%;
      padding: 12px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .continue-btn:hover { background: #d0d0d0; }

    /* Pie de página */
    .main-footer { background: #1a1a1a; color: #fff; padding: 40px; text-align: center; margin-top: 50px; }
    .footer-logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
    .footer-logo span { color: #1a5d1a; }
    .footer-copy { color: #666; font-size: 0.8rem; }

    /* En móvil, todo se apila verticalmente */
    @media (max-width: 900px) {
      .cart-container { grid-template-columns: 1fr; }
      .cart-item { grid-template-columns: 70px 1fr; gap: 12px; }
      .item-quantity, .item-price { display: none; }
    }
  </style>
</head>
<body>

  <!-- Cabecera con logo, navegación y carrito -->
  <header class="main-header">
    <a href="home.html" class="logo">JOGO <span>BONITO</span></a>
    <nav class="main-nav">
      <a href="home.html" class="nav-item">Home</a>
      <a href="camisetas.html" class="nav-item">Camisetas</a>
      <a href="botas.html" class="nav-item">Botas</a>
    </nav>
    <div style="display:flex; gap:20px; align-items:center;">
      <a href="ajustes.html"><div class="user-icon">👤</div></a>
      <a href="carrito.html" class="cart-icon">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <!-- Contenido del carrito -->
  <div class="cart-container">

    <!-- Lista de productos añadidos -->
    <div class="cart-items">
      <h2>🛒 Tu Carrito de Compra</h2>
      <div id="cartContent">
        <!-- Si el carrito está vacío se muestra este mensaje -->
        <div class="cart-empty">
          <div class="cart-empty-icon">📦</div>
          <p>Tu carrito está vacío</p>
          <a href="home.html" class="cart-empty-btn">Continuar Comprando</a>
        </div>
      </div>
    </div>

    <!-- Resumen del pedido con precios -->
    <div class="cart-summary">
      <h3>Resumen del pedido</h3>
      <div class="summary-row"><span>Subtotal:</span><span id="subtotal">0,00 €</span></div>
      <div class="summary-row"><span>Envío:</span><span>Gratis</span></div>
      <div class="summary-row"><span>Impuestos (21%):</span><span id="taxes">0,00 €</span></div>
      <div class="summary-row total"><span>Total:</span><span id="total">0,00 €</span></div>
      <button class="checkout-btn" onclick="procederPago()">Proceder al Pago</button>
      <a href="home.html"><button class="continue-btn">Continuar Comprando</button></a>
    </div>

  </div>

  <!-- Pie de página -->
  <footer class="main-footer">
    <div class="footer-logo">JOGO <span>BONITO</span></div>
    <p class="footer-copy">© 2026 Jogo Bonito - Tu tienda de fútbol de confianza | Reus, Catalunya</p>
  </footer>

  <script>
    // Carga el carrito guardado en el navegador
    let carrito = JSON.parse(localStorage.getItem('jogoBonitoCart')) || [];

    // Dibuja todos los productos del carrito en pantalla
    function renderCarrito() {
      const cartContent = document.getElementById('cartContent');

      // Si está vacío, muestra el mensaje y esconde el resumen
      if (carrito.length === 0) {
        cartContent.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">📦</div>
            <p>Tu carrito está vacío</p>
            <a href="home.html" class="cart-empty-btn">Continuar Comprando</a>
          </div>`;
        document.querySelector('.cart-summary').style.display = 'none';
        return;
      }

      // Si hay productos, los muestra uno por uno
      document.querySelector('.cart-summary').style.display = 'block';
      cartContent.innerHTML = '';
      carrito.forEach((item, index) => {
        cartContent.innerHTML += `
          <div class="cart-item">
            <div class="item-image">⚽</div>
            <div class="item-details">
              <h3>${item.nombre}</h3>
              <p>${item.precio.toFixed(2)} € por unidad</p>
            </div>
            <div class="item-quantity">
              <button class="qty-btn" onclick="cambiarCantidad(${index}, -1)">−</button>
              <input type="number" class="qty-input" value="${item.cantidad}" min="1"
                onchange="cambiarCantidadDirecta(${index}, this.value)">
              <button class="qty-btn" onclick="cambiarCantidad(${index}, 1)">+</button>
            </div>
            <div class="item-price">${(item.precio * item.cantidad).toFixed(2)} €</div>
            <button class="remove-btn" onclick="eliminarDelCarrito(${index})">❌</button>
          </div>`;
      });

      actualizarResumen();
      document.getElementById('cartCount').textContent = carrito.reduce((s, i) => s + i.cantidad, 0);
    }

    // Sube o baja la cantidad de un producto
    function cambiarCantidad(index, valor) {
      carrito[index].cantidad += valor;
      if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
      guardarCarrito();
      renderCarrito();
    }

    // Cambia la cantidad escribiendo directamente en el input
    function cambiarCantidadDirecta(index, valor) {
      carrito[index].cantidad = parseInt(valor) || 1;
      if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
      guardarCarrito();
      renderCarrito();
    }

    // Elimina un producto del carrito
    function eliminarDelCarrito(index) {
      carrito.splice(index, 1);
      guardarCarrito();
      renderCarrito();
    }

    // Calcula y muestra subtotal, impuestos y total
    function actualizarResumen() {
      const subtotal = carrito.reduce((s, i) => s + (i.precio * i.cantidad), 0);
      const taxes = subtotal * 0.21;
      document.getElementById('subtotal').textContent = subtotal.toFixed(2) + ' €';
      document.getElementById('taxes').textContent = taxes.toFixed(2) + ' €';
      document.getElementById('total').textContent = (subtotal + taxes).toFixed(2) + ' €';
    }

    // Guarda el carrito actualizado en el navegador
    function guardarCarrito() {
      localStorage.setItem('jogoBonitoCart', JSON.stringify(carrito));
    }

    // Simula el proceso de pago
    function procederPago() {
      if (carrito.length === 0) { alert('Tu carrito está vacío'); return; }
      alert('✅ Proceder al pago (pendiente de implementar pasarela de pago)');
    }

    // Al abrir la página, pinta el carrito
    document.addEventListener('DOMContentLoaded', renderCarrito);
  </script>

</body>
</html>
