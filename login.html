<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jogo Bonito</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* =====================================================
           RESET Y BASE
           ===================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* =====================================================
           CONTENEDOR PRINCIPAL CON IMAGEN DE FONDO
           Similar al estilo TopFlex
           ===================================================== */
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;

            /* Imagen de fondo de futbol a pantalla completa */
            background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1920') 
                        center/cover no-repeat fixed;
        }

        /* Overlay oscuro semi-transparente para mejor legibilidad */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* =====================================================
           LOGO / TÍTULO PRINCIPAL (como TopFlex)
           ===================================================== */
        .brand-title {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 4rem;
            font-weight: 700;
            font-style: italic;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* =====================================================
           FORMULARIO CENTRADO
           ===================================================== */
        .login-box {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            padding: 40px 35px;
            margin: 0 20px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animación fade-out para transición exitosa */
        .login-box.fade-out-animation {
            animation: fadeOutUp 0.8s ease-out forwards;
        }

        @keyframes fadeOutUp {
            to {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
        }

        /* =====================================================
           LOGO DENTRO DEL FORMULARIO
           ===================================================== */
        .logo-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            color: #1a5d1a;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .tagline {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* =====================================================
           MENSAJE DE ERROR
           ===================================================== */
        .error-message {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* =====================================================
           CAMPOS DEL FORMULARIO
           ===================================================== */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1a5d1a;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 93, 26, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        /* =====================================================
           BOTÓN INGRESAR - Grande y llamativo
           ===================================================== */
        .btn-ingresar {
            background: linear-gradient(135deg, #2d8f2d 0%, #1a5d1a 100%);
            color: white;
            padding: 16px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: inherit;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(26, 93, 26, 0.4);
            transition: all 0.3s ease;
        }

        .btn-ingresar:hover {
            background: linear-gradient(135deg, #3da03d 0%, #2d8f2d 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 93, 26, 0.5);
        }

        .btn-ingresar:active {
            transform: translateY(0);
        }

        /* =====================================================
           ENLACES DE AYUDA
           ===================================================== */
        .help-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .help-links a {
            color: #1a5d1a;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .help-links a:hover {
            text-decoration: underline;
        }

        .separator {
            color: #ccc;
            margin: 0 10px;
        }

        /* =====================================================
           TEXTO INFERIOR (como TopFlex)
           ===================================================== */
        .footer-text {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            line-height: 1.6;
        }

        .footer-text a {
            color: #ffc107;
            text-decoration: none;
        }

        /* =====================================================
           RESPONSIVE
           ===================================================== */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 2.5rem;
            }

            .login-box {
                padding: 30px 25px;
                margin: 0 15px;
            }

            .logo {
                font-size: 1.5rem;
            }

            .btn-ingresar {
                padding: 14px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- =====================================================
         CONTENEDOR PRINCIPAL CON FONDO DE ESTADIO
         ===================================================== -->
    <div class="login-container" id="loginContainer">

        <!-- Logo principal -->
        <img src="/img/logo.png" alt="Jogo Bonito" class="brand-logo">

        <!-- =====================================================
             FORMULARIO DE LOGIN CENTRADO
             ===================================================== -->
        <div class="login-box" id="loginBox">

            <!-- Logo dentro del formulario -->
            <div class="logo-section">
                <h2 class="logo">⚽ INICIAR SESIÓN</h2>
                <p class="tagline">Accede a tu cuenta</p>
            </div>

            <!-- Mensaje de error (oculto por defecto) -->
            <div class="error-message" id="errorMessage" style="display: none;">
                <span>⚠️</span>
                <span id="errorText">Usuario o contraseña incorrectos.</span>
            </div>

            <!-- Formulario -->
            <form id="loginForm" class="login-form" method="POST" action="login.php">

                <!-- Campo Usuario -->
                <div class="input-group">
                    <label for="usuario">
                        👤 Usuario
                    </label>
                    <input 
                        type="text" 
                        id="usuario" 
                        name="usuario" 
                        placeholder="Ingresa tu usuario"
                        required
                        autocomplete="username"
                    >
                </div>

                <!-- Campo Contraseña -->
                <div class="input-group">
                    <label for="contrasena">
                        🔒 Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="contrasena" 
                        name="contrasena" 
                        placeholder="Ingresa tu contraseña"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <!-- Botón Ingresar -->
                <button type="submit" class="btn-ingresar">
                    INGRESAR
                </button>

            </form>

            <!-- Enlaces de ayuda -->
            <div class="help-links">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <span class="separator">|</span>
                <a href="#">Crear cuenta</a>
            </div>

        </div>

        <!-- Texto inferior estilo TopFlex -->
        <p class="footer-text">
            Para cualquier duda relacionada con tu pedido puedes escribir a 
            <a href="mailto:info@jogobonito.es">info@jogobonito.es</a>
        </p>

    </div>

    <!-- =====================================================
         JAVASCRIPT
         ===================================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);

            // Mostrar error si existe
            if (urlParams.has('error')) {
                const errorCode = urlParams.get('error');
                const errorMessage = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');

                switch(errorCode) {
                    case '1':
                        errorText.textContent = 'Usuario o contraseña incorrectos.';
                        break;
                    case '2':
                        errorText.textContent = 'Por favor, completa todos los campos.';
                        break;
                    default:
                        errorText.textContent = 'Ha ocurrido un error. Intenta nuevamente.';
                }

                errorMessage.style.display = 'flex';
            }

            // Transición exitosa
            if (urlParams.has('success')) {
                const loginBox = document.getElementById('loginBox');
                loginBox.classList.add('fade-out-animation');

                setTimeout(function() {
                    window.location.href = 'home.html';
                }, 800);
            }
        });

        // Validación antes de enviar
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const usuario = document.getElementById('usuario').value.trim();
            const contrasena = document.getElementById('contrasena').value.trim();

            if (usuario === '' || contrasena === '') {
                e.preventDefault();
                const errorMessage = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                errorText.textContent = 'Por favor, completa todos los campos.';
                errorMessage.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
